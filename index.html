<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Karaoke Web - YouTube</title><style>body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);color:#fff;text-align:center;padding:20px;margin:0;min-height:100vh}h1{margin-bottom:10px;color:#e94560}.subtitle{color:#aaa;margin-bottom:30px;font-size:0.9em}.search-container{max-width:600px;margin:0 auto 30px;display:flex;gap:10px}input{flex:1;padding:12px;border-radius:25px;border:none;font-size:16px;outline:none}button{padding:12px 25px;border-radius:25px;border:none;background:#e94560;color:white;font-weight:bold;cursor:pointer;transition:background 0.3s}button:hover{background:#ff2e63}#player-container{max-width:800px;margin:0 auto 20px;background:#0f3460;padding:10px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.5);min-height:450px;display:flex;align-items:center;justify-content:center}#player{width:100%;height:100%}#results{max-width:600px;margin:0 auto;list-style:none;padding:0}.result-item{background:rgba(255,255,255,0.05);margin:8px 0;padding:15px;border-radius:8px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:15px;transition:background 0.2s}.result-item:hover{background:rgba(233, 69, 96, 0.2)}.thumb{width:80px;height:60px;object-fit:cover;border-radius:4px}.info h3{margin:0;font-size:16px;color:#fff}.info p{margin:4px 0 0;font-size:13px;color:#ccc}.lyrics-box{margin-top:20px;padding:20px;background:rgba(0,0,0,0.3);border-radius:10px;font-style:italic;color:#ffd700;min-height:50px;max-width:600px;margin-left:auto;margin-right:auto}.rec-panel{margin:20px auto;max-width:600px;background:#1f4068;padding:15px;border-radius:10px;border:1px solid #e94560}.rec-buttons{display:flex;justify-content:center;gap:10px;margin-bottom:15px}.btn-rec{background:#28a745}.btn-rec:hover{background:#218838}.btn-stop{background:#dc3545}.btn-stop:hover{background:#c82333}audio{width:100%;max-width:400px;margin-top:5px;border-radius:5px}</style></head><body><h1>🎤 Karaoke Web - YouTube</h1><p class="subtitle">Busca artistas y reproduce instrumentales</p><div class="search-container"><input type="text" id="searchInput" placeholder="Ej: Cristian Castro, Shakira, Bad Bunny..."><button onclick="searchYouTube()">Buscar</button></div><div id="player-container"><div id="player"><p style="color: #aaa;">Selecciona una canción para comenzar</p></div></div><div class="rec-panel"><h3>🎙️ Grabadora de Voz</h3><div class="rec-buttons"><button id="startRec" class="btn-rec">Grabar Mi Voz</button><button id="stopRec" class="btn-stop" disabled>Detener Grabación</button></div><audio id="audioPlayback" controls></audio></div><div id="lyricsDisplay" class="lyrics-box">Las letras aparecerán aquí...</div><ul id="results"></ul><script src="https://youtube.com"></script><script>let player;let currentVideoId=null;let checkTimeInterval;let mediaRecorder;let audioChunks=[];function onYouTubeIframeAPIReady(){player=new YT.Player('player',{height:'390',width:'100%',playerVars:{'playsinline':1,'rel':0,'modestbranding':1},events:{'onReady':onPlayerReady,'onStateChange':onPlayerStateChange}})}function onPlayerReady(event){}function onPlayerStateChange(event){if(event.data===YT.PlayerState.PLAYING){clearInterval(checkTimeInterval);checkTimeInterval=setInterval(()=>{if(player&&typeof player.getCurrentTime==='function'){if(player.getCurrentTime()>=60){player.stopVideo();clearInterval(checkTimeInterval);if(mediaRecorder&&mediaRecorder.state==="recording"){mediaRecorder.stop();document.getElementById('startRec').disabled=false;document.getElementById('stopRec').disabled=true}alert('El tiempo límite de 1 minuto ha terminado. Grabación guardada.')}}},500)}else{clearInterval(checkTimeInterval)}}async function searchYouTube(){const query=document.getElementById('searchInput').value;const resultsList=document.getElementById('results');const apiKey='AIzaSyDgU1Rn-l3D3caIg2wOUONkZWBCGHNJUvg';if(!query)return;resultsList.innerHTML='<li style="text-align:center; color:#aaa;">Buscando en YouTube...</li>';const searchTerm=`${query} instrumental karaoke`;const url=`https://googleapis.com{encodeURIComponent(searchTerm)}&type=video&key=${apiKey}`;try{const response=await fetch(url);const data=await response.json();if(data.error){console.error("Error API:",data.error);resultsList.innerHTML=`<li style="text-align:center; color:red;">Error: ${data.error.message}. Revisa tu conexión o cuota.</li>`;return}const items=data.items;const tracks=items.map(item=>({id:item.id.videoId,title:item.snippet.title,artist:item.snippet.channelTitle}));renderResults(tracks)}catch(error){console.error("Error de red:",error);resultsList.innerHTML='<li style="text-align:center; color:red;">Error al conectar con YouTube.</li>'}}function renderResults(tracks){const list=document.getElementById('results');list.innerHTML='';if(tracks.length===0){list.innerHTML='<li style="text-align:center; color:#aaa;">No se encontraron resultados. Intenta buscar "Shakira instrumental" o "Bad Bunny karaoke".</li>';return}tracks.forEach(track=>{const li=document.createElement('li');li.className='result-item';li.innerHTML=`<img src="https://youtube.com{track.id}/default.jpg" class="thumb" alt="Thumb"><div class="info"><h3>${track.title}</h3><p>${track.artist}</p></div>`;li.onclick=()=>playVideo(track.id,track.title);list.appendChild(li)})}function playVideo(videoId,title){currentVideoId=videoId;if(player&&player.loadVideoById){player.loadVideoById(videoId);document.getElementById('lyricsDisplay').innerHTML=`<strong>Reproduciendo:</strong> ${title}<br><br>¡Disfruta el karaoke!`}}document.getElementById('searchInput').addEventListener('keypress',function(e){if(e.key==='Enter')searchYouTube()});if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=event=>{audioChunks.push(event.data)};mediaRecorder.onstop=()=>{const audioBlob=new Blob(audioChunks,{type:'audio/wav'});const audioUrl=URL.createObjectURL(audioBlob);document.getElementById('audioPlayback').src=audioUrl;audioChunks=[]};document.getElementById('startRec').addEventListener('click',()=>{mediaRecorder.start();document.getElementById('startRec').disabled=true;document.getElementById('stopRec').disabled=false});document.getElementById('stopRec').addEventListener('click',()=>{mediaRecorder.stop();document.getElementById('startRec').disabled=false;document.getElementById('stopRec').disabled=true})}).catch(err=>{console.error("Error al acceder al micrófono:",err)})}else{document.querySelector('.rec-panel').innerHTML='<p style="color:red;">Tu navegador no soporta la grabación de audio.</p>'}</script></body></html>
